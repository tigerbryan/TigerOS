services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tigeros
      POSTGRES_USER: tigeros
      POSTGRES_PASSWORD: tigeros
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tigeros -d tigeros"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
